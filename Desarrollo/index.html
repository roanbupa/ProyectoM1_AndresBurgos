<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Paletas</title>

    <!-- CSS externo (evitar estilos inline) -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Generador de Paletas de Colores</h1>
    </header>

    <main>
      <div class="control">
        <label for="cantidadColores">Cantidad de colores:</label>
        <select id="cantidadColores">
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5</option>
          <option value="6">6</option>
        </select>

        <button id="generarBtn">Generar paleta</button>
      </div>

      <section id="paleta" class="paleta">
        <!-- Aquí JS va a insertar los colores -->
      </section>
    </main>

    <footer>
      <p>Proyecto Integrador - Generador de Paletas</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
