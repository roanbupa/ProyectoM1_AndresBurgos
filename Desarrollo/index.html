<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Paletas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Generador de Paletas de Colores</h1>
    </header>

    <main>
      <div class="control">
        <!-- Selector de cantidad de colores -->
        <label for="cantidadColores">Cantidad de colores:</label>
        <select id="cantidadColores">
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
        </select>

        <!-- Selector de formato de color -->
        <label for="formatoColor">Formato de color:</label>
        <select id="formatoColor">
          <option value="hex" selected>HEX</option>
          <option value="hsl">HSL</option>
        </select>

        <button id="generarBtn">Generar paleta</button>
      </div>

      <div id="paleta" class="paleta">
        <!-- Aquí JS insertará los colores -->
      </div>
    </main>

    <footer>
      <p>Proyecto Integrador - Generador de Paletas</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
